<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farmhouse Frames Admin — Login</title>
  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2732%22 rx=%226%22 fill=%22%234d3425%22/%3E%3Ctext x=%2216%22 y=%2223%22 font-family=%22Georgia,serif%22 font-size=%2220%22 fill=%22%23e8d5be%22 text-anchor=%22middle%22%3EF%3C/text%3E%3C/svg%3E">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Farmhouse Frames Admin</h1>
    <p class="muted">Sign in to continue.</p>

    <div id="message" class="message" hidden></div>

    <form id="loginForm" class="form">
      <label>
        <span>Email</span>
        <input id="email" type="email" autocomplete="username" required />
      </label>

      <label>
        <span>Password</span>
        <input id="password" type="password" autocomplete="current-password" required />
      </label>

      <button class="btn primary" type="submit">Sign in</button>
    </form>

    <p class="muted small">Admins must be allowlisted in the database.</p>
  </main>

  <script type="module">
    import { signIn } from './js/auth.js';

    const $ = (sel) => document.querySelector(sel);
    const msg = $('#message');

    function showMessage(text, kind = 'error') {
      msg.hidden = false;
      msg.className = `message ${kind}`;
      msg.textContent = text;
    }

    $('#loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.hidden = true;

      const email = $('#email').value.trim();
      const password = $('#password').value;

      try {
        await signIn(email, password);
        window.location.href = './index.html';
      } catch (err) {
        showMessage(err?.message || String(err));
      }
    });
  </script>
</body>
</html>
