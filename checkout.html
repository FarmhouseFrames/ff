<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Farmhouse Frames</title>
    <link rel="stylesheet" href="css/commerce.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2732%22 rx=%226%22 fill=%22%234d3425%22/%3E%3Ctext x=%2216%22 y=%2223%22 font-family=%22Georgia,serif%22 font-size=%2220%22 fill=%22%23e8d5be%22 text-anchor=%22middle%22%3EF%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="commerce-shell">
        <header class="commerce-topbar">
            <a href="index.html">Farmhouse Frames</a>
            <div class="summary-actions">
                <a class="commerce-button-link" href="cart.html">Back to cart</a>
                <a class="commerce-button-link" href="products/index.html">Browse products</a>
                <a class="commerce-button-link" href="account-login.html">Account</a>
            </div>
        </header>

        <section class="commerce-hero">
            <h1>Checkout</h1>
            <p>This checkout flow is static-hosting safe. It prepares a full order request from the shared cart and sends it to the store email.</p>
        </section>

        <main id="checkoutRoot" class="commerce-layout"></main>
    </div>

    <script type="module">
        import { calculateCartTotals, clearCart, formatCartSummary, formatCurrency, loadStoreConfig, readCart } from './js/commerce.js';
        import { publicSupabase } from './js/supabasePublic.js';

        const checkoutRoot = document.getElementById('checkoutRoot');
        const config = await loadStoreConfig();
        const paymentLink = String(config.hostedPaymentUrl || config.hosted_payment_url || '').trim();

        async function getSignedInCustomer() {
            const { data } = await publicSupabase.auth.getSession();
            return data.session?.user || null;
        }

        async function createOrderRequestWithFallback(payload) {
            const { data, error } = await publicSupabase
                .from('order_requests')
                .insert(payload)
                .select()
                .single();

            if (!error) {
                return { data, error: null };
            }

            // Backward compatibility: if migration adding customer_user_id is not applied yet,
            // retry without that column so checkout still works.
            if (error.message && error.message.toLowerCase().includes('customer_user_id')) {
                const fallbackPayload = { ...payload };
                delete fallbackPayload.customer_user_id;
                return publicSupabase
                    .from('order_requests')
                    .insert(fallbackPayload)
                    .select()
                    .single();
            }

            return { data: null, error };
        }

        async function saveOrderAndItems({ customer, name, email, fulfillment, notes, totals, items }) {
            const { data: orderRequest, error: orderError } = await createOrderRequestWithFallback({
                customer_user_id: customer?.id || null,
                customer_name: name,
                customer_email: email,
                fulfillment_method: fulfillment,
                notes: notes || null,
                subtotal: totals.subtotal,
                tax: totals.tax,
                total: totals.total,
                status: 'new'
            });

            if (orderError) {
                throw orderError;
            }

            const lineItems = items.map((item) => ({
                order_request_id: orderRequest.id,
                product_id: item.productId || null,
                title: item.title,
                size: item.size || null,
                quantity: item.quantity,
                unit_price: item.price
            }));

            const { error: itemError } = await publicSupabase
                .from('order_request_items')
                .insert(lineItems);

            if (itemError) {
                throw itemError;
            }

            return orderRequest;
        }

        function buildHostedPaymentUrl(baseUrl, customerEmail, orderId) {
            if (!baseUrl) {
                return '';
            }

            try {
                const url = new URL(baseUrl);
                if (customerEmail) {
                    url.searchParams.set('prefilled_email', customerEmail);
                }
                if (orderId) {
                    url.searchParams.set('client_reference_id', orderId);
                }
                return url.toString();
            } catch {
                return baseUrl;
            }
        }

        function renderEmptyCheckout() {
            checkoutRoot.innerHTML = `
                <section class="empty-card">
                    <h2>Your cart is empty</h2>
                    <p>Add products before going to checkout.</p>
                    <p><a class="commerce-button-link primary" href="products/index.html">Browse products</a></p>
                </section>
            `;
        }

        function renderCheckout() {
            const items = readCart();
            if (!items.length) {
                renderEmptyCheckout();
                return;
            }

            const totals = calculateCartTotals(items, config.tax);
            getSignedInCustomer().then((customer) => {
            checkoutRoot.innerHTML = `
                <section class="checkout-form">
                    <h2>Customer details</h2>
                    ${customer ? `<p class="helper-text">Signed in as ${customer.email}. This order will appear in your account history.</p>` : '<p class="helper-text">Guest checkout is available, or <a href="account-login.html">sign in</a> to track orders in your account.</p>'}
                    <div class="checkout-grid">
                        <label>
                            Full name
                            <input id="customerName" type="text" autocomplete="name" required>
                        </label>
                        <label>
                            Email
                            <input id="customerEmail" type="email" autocomplete="email" required>
                        </label>
                        <label>
                            Fulfillment
                            <select id="fulfillmentMethod">
                                <option value="Pickup">Pickup</option>
                                <option value="Shipping">Shipping</option>
                            </select>
                        </label>
                        <label>
                            Notes
                            <textarea id="orderNotes" placeholder="Pickup timing, shipping preferences, frame notes, or anything else useful."></textarea>
                        </label>
                    </div>
                    <div class="checkout-actions" style="margin-top: 16px;">
                        <button id="sendOrderButton" class="commerce-button primary" type="button">Prepare order email</button>
                        ${paymentLink ? '<button id="payNowButton" class="commerce-button primary" type="button">Pay now securely</button>' : ''}
                        <button id="clearAfterSendButton" class="commerce-button" type="button">Clear cart</button>
                    </div>
                    <p id="checkoutStatus" class="status-message">${paymentLink ? 'Payment link is enabled. You can save your order and continue to secure checkout.' : 'Payment link is not configured yet, so this checkout prepares a structured order request email.'}</p>
                </section>

                <aside class="summary-card">
                    <h2>Order summary</h2>
                    <div class="summary-list">
                        ${items.map((item) => `
                            <div class="summary-line"><span>${item.title}${item.size ? ` (${item.size})` : ''} × ${item.quantity}</span><span>${formatCurrency(item.price * item.quantity, config.currency)}</span></div>
                        `).join('')}
                        <div class="summary-line"><span>Subtotal</span><span>${formatCurrency(totals.subtotal, config.currency)}</span></div>
                        <div class="summary-line"><span>Estimated tax</span><span>${formatCurrency(totals.tax, config.currency)}</span></div>
                        <div class="summary-line total"><span>Total</span><span>${formatCurrency(totals.total, config.currency)}</span></div>
                    </div>
                    <p class="helper-text">Store contact: ${config.businessEmail}</p>
                </aside>
            `;

            const status = document.getElementById('checkoutStatus');
            if (customer?.email) {
                const emailInput = document.getElementById('customerEmail');
                emailInput.value = customer.email;
            }

            document.getElementById('sendOrderButton').addEventListener('click', async () => {
                const formValues = {
                    name: document.getElementById('customerName').value.trim(),
                    email: document.getElementById('customerEmail').value.trim(),
                    fulfillment: document.getElementById('fulfillmentMethod').value,
                    notes: document.getElementById('orderNotes').value.trim()
                };

                if (!formValues.name || !formValues.email) {
                    status.textContent = 'Enter your name and email before preparing the order request.';
                    return;
                }

                status.textContent = 'Saving your order request...';

                try {
                    const orderRequest = await saveOrderAndItems({
                        customer,
                        name: formValues.name,
                        email: formValues.email,
                        fulfillment: formValues.fulfillment,
                        notes: formValues.notes,
                        totals,
                        items
                    });

                    status.textContent = `Order saved (ID: ${orderRequest.id}). Opening your email client...`;
                } catch (error) {
                    status.textContent = `Could not save order to dashboard queue. Email fallback still works. (${error.message})`;
                }

                const subject = encodeURIComponent(`Farmhouse Frames order request for ${formValues.name}`);
                const body = formatCartSummary(items, config, formValues);
                window.location.href = `mailto:${encodeURIComponent(config.businessEmail)}?subject=${subject}&body=${body}`;
                status.textContent = 'Your email client should open with the prefilled order request. Your order has also been routed to the admin queue when available.';
            });

            if (paymentLink) {
                document.getElementById('payNowButton')?.addEventListener('click', async () => {
                    const name = document.getElementById('customerName').value.trim();
                    const email = document.getElementById('customerEmail').value.trim();
                    if (!name || !email) {
                        status.textContent = 'Enter name and email before continuing to payment.';
                        return;
                    }

                    status.textContent = 'Saving order before payment...';
                    let orderId = '';

                    try {
                        const orderRequest = await saveOrderAndItems({
                            customer,
                            name,
                            email,
                            fulfillment: document.getElementById('fulfillmentMethod').value,
                            notes: document.getElementById('orderNotes').value.trim(),
                            totals,
                            items
                        });
                        orderId = orderRequest.id;
                    } catch (error) {
                        status.textContent = `Could not save order before payment: ${error.message}`;
                        return;
                    }

                    const hostedUrl = buildHostedPaymentUrl(paymentLink, email, orderId);
                    window.location.href = hostedUrl;
                });
            }

            document.getElementById('clearAfterSendButton').addEventListener('click', () => {
                clearCart();
                renderEmptyCheckout();
            });
            });
        }

        renderCheckout();
    </script>
</body>
</html>
