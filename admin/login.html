<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farmhouse Frames Admin — Login</title>
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Farmhouse Frames Admin</h1>
    <p class="muted">Sign in to continue.</p>

    <div id="message" class="message" hidden></div>

    <form id="loginForm" class="form">
      <label>
        <span>Email</span>
        <input id="email" type="email" autocomplete="username" required />
      </label>

      <label>
        <span>Password</span>
        <input id="password" type="password" autocomplete="current-password" required />
      </label>

      <button class="btn primary" type="submit">Sign in</button>
    </form>

    <p class="muted small">Admins must be allowlisted in the database.</p>
  </main>

  <script type="module">
    import { signIn } from './js/auth.js';

    const $ = (sel) => document.querySelector(sel);
    const msg = $('#message');

    function showMessage(text, kind = 'error') {
      msg.hidden = false;
      msg.className = `message ${kind}`;
      msg.textContent = text;
    }

    $('#loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.hidden = true;

      const email = $('#email').value.trim();
      const password = $('#password').value;

      try {
        await signIn(email, password);
        window.location.href = './index.html';
      } catch (err) {
        showMessage(err?.message || String(err));
      }
    });
  </script>
</body>
</html>
