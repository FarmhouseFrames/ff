<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Order Entry | Farmhouse Frames Admin</title>
    <link rel="stylesheet" href="../dashboard/css/admin.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-title">Farmhouse Frames</div>
            <div class="brand-subtitle">Admin</div>
        </div>

        <nav class="nav">
            <a href="../dashboard/index.html">Dashboard</a>
            <a href="../admin-dashboard.html">Studio Cutter</a>
            <a href="./manual-entry.html" class="active">Manual Entry</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1>Manual Order Entry</h1>
            <div class="topbar-actions">
                <span id="statusPill" class="pill">Ready</span>
            </div>
        </header>

        <section class="content">
            <div class="card">
                <h2>Create Manual Order</h2>
                <p class="muted">This page is auth-gated and writes manual orders to Supabase.</p>
            </div>

            <div class="card">
                <form id="manualOrderForm" class="form">
                    <div class="form-group">
                        <label for="customerName">Customer Name</label>
                        <input id="customerName" type="text" required>
                    </div>

                    <div class="form-group">
                        <label for="customerEmail">Customer Email</label>
                        <input id="customerEmail" type="email" required>
                    </div>

                    <div class="form-group">
                        <label for="productName">Product</label>
                        <input id="productName" type="text" placeholder="Mounted Quintet" required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount (USD)</label>
                        <input id="amount" type="number" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Alignment Notes</label>
                        <textarea id="notes" rows="4" placeholder="Photo-to-frame alignment notes"></textarea>
                    </div>

                    <div class="row">
                        <button type="submit" class="btn primary">Save Manual Order</button>
                    </div>
                </form>

                <div id="message" class="message" hidden></div>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { requireAdminSession, getCurrentUser } from '../dashboard/js/auth.js';
    import { supabase } from '../dashboard/js/supabaseClient.js';

    const form = document.getElementById('manualOrderForm');
    const msg = document.getElementById('message');
    const statusPill = document.getElementById('statusPill');

    function setMessage(text, kind = 'ok') {
        msg.hidden = false;
        msg.className = `message ${kind}`;
        msg.textContent = text;
    }

    function setStatus(text, kind = 'neutral') {
        statusPill.textContent = text;
        statusPill.className = `pill ${kind}`;
    }

    async function init() {
        try {
            await requireAdminSession();
            setStatus('Authorized', 'ok');
        } catch (error) {
            setStatus('Access denied', 'error');
            setMessage(error.message, 'error');
        }
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        msg.hidden = true;
        setStatus('Saving...', 'neutral');

        try {
            const user = await getCurrentUser();

            const customerName = document.getElementById('customerName').value.trim();
            const customerEmail = document.getElementById('customerEmail').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const amount = Number(document.getElementById('amount').value || 0);
            const notes = document.getElementById('notes').value.trim();

            const { data: orderRequest, error: orderError } = await supabase
                .from('order_requests')
                .insert({
                    customer_name: customerName,
                    customer_email: customerEmail,
                    fulfillment_method: 'Pickup',
                    notes: notes ? `Manual entry: ${notes}` : 'Manual entry',
                    status: 'new',
                    subtotal: amount,
                    tax: 0,
                    total: amount
                })
                .select('id')
                .single();

            if (orderError) {
                throw orderError;
            }

            const { error: itemError } = await supabase
                .from('order_request_items')
                .insert({
                    order_request_id: orderRequest.id,
                    title: productName,
                    quantity: 1,
                    unit_price: amount
                });

            if (itemError) {
                throw itemError;
            }

            form.reset();
            setStatus('Saved', 'ok');
            setMessage('Manual order saved.', 'ok');
        } catch (error) {
            setStatus('Save failed', 'error');
            setMessage(error.message, 'error');
        }
    });

    init();
</script>
</body>
</html>
