<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Farmhouse Frames</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand-link" href="../index.html">Farmhouse Frames</a>
      <nav class="nav-links">
        <a href="./index.html">All Products</a>
        <a href="../cart.html">Cart</a>
        <a href="../pickup.html">Pickup</a>
      </nav>
    </header>

    <section class="hero">
      <div class="eyebrow">Product Detail</div>
      <h1 id="detailTitle">Loading product...</h1>
      <p id="detailIntro">The product data for this page is loaded from the shared catalog.</p>
    </section>

    <main id="detailRoot" class="detail-grid">
      <section class="card status-box">
        <p>Loading product details...</p>
      </section>
    </main>
  </div>

  <script type="module">
    import { addToCart, findProduct, formatCurrency, loadProducts } from './products.js';

    const detailRoot = document.getElementById('detailRoot');
    const detailTitle = document.getElementById('detailTitle');
    const detailIntro = document.getElementById('detailIntro');
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    function renderMissingProduct() {
      detailTitle.textContent = 'Product not found';
      detailIntro.textContent = 'The requested product could not be found in the current product catalog.';
      detailRoot.innerHTML = `
        <section class="card empty-state">
          <h2>Missing product</h2>
          <p>Check the product ID in the URL or add the product to the shared JSON catalog.</p>
          <p><a class="button-link primary" href="./index.html">Browse all products</a></p>
        </section>
      `;
    }

    function renderProduct(product) {
      detailTitle.textContent = product.title;
      detailIntro.textContent = product.category;

      const sizeOptions = product.sizes.length
        ? product.sizes.map((size) => `<option value="${size}">${size}</option>`).join('')
        : '<option value="custom">Custom sizing</option>';

      const tags = product.tags.length
        ? product.tags.map((tag) => `<span class="pill">${tag}</span>`).join('')
        : '<span class="pill">made-to-order</span>';

      const inventoryLabel = product.inventory > 0 ? `${product.inventory} available` : 'Availability on request';

      detailRoot.innerHTML = `
        <section class="product-layout">
          <article class="detail-card">
            <img class="detail-image" src="${product.image}" alt="${product.title}">
            <div class="detail-body">
              <div class="pill-row">
                <span class="pill">${product.category}</span>
                <span class="pill">${inventoryLabel}</span>
              </div>
              <h2>${product.title}</h2>
              <p>${product.description || 'No description available yet.'}</p>
              <div class="price">${formatCurrency(product.price, product.currency)}</div>
              <div class="detail-tags">${tags}</div>
            </div>
          </article>

          <aside class="detail-grid">
            <section class="sidebar-card">
              <h3>Options</h3>
              <div class="detail-actions">
                <select id="sizeSelect" aria-label="Choose a size">${sizeOptions}</select>
                <button id="addToCartButton" class="button" type="button">Add to cart</button>
                <a class="button-link" href="./index.html">Back to products</a>
              </div>
            </section>

            <section class="sidebar-card">
              <h3>Product data</h3>
              <div class="size-list">
                ${product.sizes.length ? product.sizes.map((size) => `<span class="pill">${size}</span>`).join('') : '<span class="pill">Custom size</span>'}
              </div>
              <p class="muted">Product ID: ${product.id}</p>
              ${product.notes ? `<p class="muted">Notes: ${product.notes}</p>` : ''}
            </section>
          </aside>
        </section>
      `;

      const addToCartButton = document.getElementById('addToCartButton');
      const sizeSelect = document.getElementById('sizeSelect');
      addToCartButton.addEventListener('click', () => {
        addToCart(product, sizeSelect.value);
        addToCartButton.textContent = 'Added to cart';
        window.setTimeout(() => {
          addToCartButton.textContent = 'Add to cart';
        }, 1200);
      });
    }

    try {
      const products = await loadProducts();
      if (!productId) {
        renderMissingProduct();
      } else {
        const product = findProduct(products, productId);
        if (product) {
          renderProduct(product);
        } else {
          renderMissingProduct();
        }
      }
    } catch (error) {
      detailTitle.textContent = 'Unable to load products';
      detailIntro.textContent = error.message;
      detailRoot.innerHTML = `
        <section class="card status-box">
          <p>Product data could not be loaded right now.</p>
        </section>
      `;
    }
  </script>
</body>
</html>
