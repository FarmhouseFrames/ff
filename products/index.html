<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Products | Farmhouse Frames</title>
	<link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2732%22 rx=%226%22 fill=%22%234d3425%22/%3E%3Ctext x=%2216%22 y=%2223%22 font-family=%22Georgia,serif%22 font-size=%2220%22 fill=%22%23e8d5be%22 text-anchor=%22middle%22%3EF%3C/text%3E%3C/svg%3E">
</head>
<body data-category="all">
	<div class="page-shell">
		<header class="topbar">
			<a class="brand-link" href="../index.html">Farmhouse Frames</a>
			<nav class="nav-links">
				<a href="./index.html">Products</a>
				<a href="../cart.html">Cart</a>
				<a href="../pickup.html">Pickup</a>
			</nav>
		</header>

		<section class="hero">
			<div class="eyebrow">Catalog</div>
			<h1 id="pageTitle">All Products</h1>
			<p id="pageDescription">Browse the current Farmhouse Frames catalog from the shared product data sources.</p>
		</section>

		<section class="toolbar">
			<div>
				<h2 id="resultsTitle">Loading products...</h2>
			</div>
			<div class="toolbar-controls">
				<input id="searchInput" type="search" placeholder="Search products">
				<select id="sortSelect" aria-label="Sort products">
					<option value="title">Sort by title</option>
					<option value="price-asc">Price: low to high</option>
					<option value="price-desc">Price: high to low</option>
				</select>
			</div>
		</section>

		<main id="productsRoot" class="products-grid"></main>
	</div>

	<script type="module">
		import { buildPageTitle, loadProducts, matchesCategory, renderProductCard } from './products.js';

		const params = new URLSearchParams(window.location.search);
		const category = params.get('category') || 'all';
		const productsRoot = document.getElementById('productsRoot');
		const resultsTitle = document.getElementById('resultsTitle');
		const pageTitle = document.getElementById('pageTitle');
		const searchInput = document.getElementById('searchInput');
		const sortSelect = document.getElementById('sortSelect');
		let allProducts = [];

		pageTitle.textContent = buildPageTitle(category);

		function renderProducts() {
			const term = searchInput.value.trim().toLowerCase();
			const filtered = allProducts
				.filter((product) => matchesCategory(product, category))
				.filter((product) => {
					if (!term) {
						return true;
					}
					return [product.title, product.category, product.description, ...(product.tags || [])]
						.join(' ')
						.toLowerCase()
						.includes(term);
				})
				.sort((left, right) => {
					if (sortSelect.value === 'price-asc') {
						return left.price - right.price;
					}
					if (sortSelect.value === 'price-desc') {
						return right.price - left.price;
					}
					return left.title.localeCompare(right.title);
				});

			resultsTitle.textContent = `${filtered.length} product${filtered.length === 1 ? '' : 's'}`;

			if (!filtered.length) {
				productsRoot.innerHTML = `
					<section class="card empty-state">
						<h3>No products found</h3>
						<p>Try a different search or add matching products to the shared product data.</p>
					</section>
				`;
				return;
			}

			productsRoot.innerHTML = filtered.map(renderProductCard).join('');
		}

		try {
			allProducts = await loadProducts();
			renderProducts();
			searchInput.addEventListener('input', renderProducts);
			sortSelect.addEventListener('input', renderProducts);
		} catch (error) {
			resultsTitle.textContent = 'Unable to load products';
			productsRoot.innerHTML = `
				<section class="card empty-state">
					<h3>Catalog unavailable</h3>
					<p>${error.message}</p>
				</section>
			`;
		}
	</script>
</body>
</html>
