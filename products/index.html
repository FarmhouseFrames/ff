<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Products | Farmhouse Frames</title>
	<link rel="stylesheet" href="./styles.css">
</head>
<body data-category="all">
	<div class="page-shell">
		<header class="topbar">
			<a class="brand-link" href="../index.html">Farmhouse Frames</a>
			<nav class="nav-links">
				<a href="./index.html">Products</a>
				<a href="../cart.html">Cart</a>
				<a href="../pickup.html">Pickup</a>
			</nav>
		</header>

		<section class="hero">
			<div class="eyebrow">Catalog</div>
			<h1 id="pageTitle">All Products</h1>
			<p id="pageDescription">Browse the current Farmhouse Frames catalog from the shared product data sources.</p>
		</section>

		<section class="toolbar">
			<div>
				<h2 id="resultsTitle">Loading products...</h2>
			</div>
			<div class="toolbar-controls">
				<input id="searchInput" type="search" placeholder="Search products">
				<select id="sortSelect" aria-label="Sort products">
					<option value="title">Sort by title</option>
					<option value="price-asc">Price: low to high</option>
					<option value="price-desc">Price: high to low</option>
				</select>
			</div>
		</section>

		<main id="productsRoot" class="products-grid"></main>
	</div>

	<script type="module">
		import { buildPageTitle, loadProducts, matchesCategory, renderProductCard } from './products.js';

		const category = document.body.dataset.category || 'all';
		const productsRoot = document.getElementById('productsRoot');
		const resultsTitle = document.getElementById('resultsTitle');
		const pageTitle = document.getElementById('pageTitle');
		const searchInput = document.getElementById('searchInput');
		const sortSelect = document.getElementById('sortSelect');
		let allProducts = [];

		pageTitle.textContent = buildPageTitle(category);

		function renderProducts() {
			const term = searchInput.value.trim().toLowerCase();
			const filtered = allProducts
				.filter((product) => matchesCategory(product, category))
				.filter((product) => {
					if (!term) {
						return true;
					}
					return [product.title, product.category, product.description, ...(product.tags || [])]
						.join(' ')
						.toLowerCase()
						.includes(term);
				})
				.sort((left, right) => {
					if (sortSelect.value === 'price-asc') {
						return left.price - right.price;
					}
					if (sortSelect.value === 'price-desc') {
						return right.price - left.price;
					}
					return left.title.localeCompare(right.title);
				});

			resultsTitle.textContent = `${filtered.length} product${filtered.length === 1 ? '' : 's'}`;

			if (!filtered.length) {
				productsRoot.innerHTML = `
					<section class="card empty-state">
						<h3>No products found</h3>
						<p>Try a different search or add matching products to the shared product data.</p>
					</section>
				`;
				return;
			}

			productsRoot.innerHTML = filtered.map(renderProductCard).join('');
		}

		try {
			allProducts = await loadProducts();
			renderProducts();
			searchInput.addEventListener('input', renderProducts);
			sortSelect.addEventListener('input', renderProducts);
		} catch (error) {
			resultsTitle.textContent = 'Unable to load products';
			productsRoot.innerHTML = `
				<section class="card empty-state">
					<h3>Catalog unavailable</h3>
					<p>${error.message}</p>
				</section>
			`;
		}
	</script>
</body>
</html>
<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Products - Farmhouse Frames</title><style>body{font-family:Arial;padding:20px;background:#f5f5f5}.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}.product-card{background:white;padding:15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.product-card h3{margin:0 0 10px 0}.product-card p{color:#666;margin:5px 0}.price{font-size:1.3em;color:#27ae60;font-weight:bold;margin:10px 0}button{background:#27ae60;color:white;padding:10px 20px;border:none;border-radius:4px;cursor:pointer}button:hover{background:#229954}nav{margin-bottom:20px}nav a{margin-right:15px;text-decoration:none;color:#333}</style></head><body><nav><a href="/">Home</a><a href="/cart.html">Cart</a></nav><h1>Our Products</h1><div id="products" class="products-grid"></div><script>fetch('../data/products.json').then(r=>r.json()).then(products=>{let html='';products.forEach(p=>{html+='<div class="product-card"><h3>'+p.name+'</h3><p>'+p.description+'</p><p class="price">$'+p.sellingPrice.toFixed(2)+'</p><button onclick="addToCart('+p.name+','+p.sellingPrice+')">Add to Cart</button></div>'});document.getElementById('products').innerHTML=html});function addToCart(name,price){let cart=JSON.parse(localStorage.getItem('cart'))||[];cart.push({name:name,price:price});localStorage.setItem('cart',JSON.stringify(cart));alert(name+' added to cart!')}</script></body></html>
