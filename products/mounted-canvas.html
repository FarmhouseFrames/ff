<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mounted Prints | Farmhouse Frames</title>
	<link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2732%22 rx=%226%22 fill=%22%234d3425%22/%3E%3Ctext x=%2216%22 y=%2223%22 font-family=%22Georgia,serif%22 font-size=%2220%22 fill=%22%23e8d5be%22 text-anchor=%22middle%22%3EF%3C/text%3E%3C/svg%3E">
</head>
<body data-category="mounted-prints">
	<div class="page-shell">
		<header class="topbar">
			<a class="brand-link" href="../index.html">Farmhouse Frames</a>
			<nav class="nav-links">
				<a href="./index.html">All Products</a>
				<a href="../cart.html">Cart</a>
				<a href="../gallery.html">Gallery</a>
				<a href="../products/index.html?category=split-canvas">Split Canvas</a>
				<a href="../catalog.html">Catalog</a>
				<a href="../contact.html">Contact</a>
				<a href="../pickup.html">Pickup &amp; Shipping</a>
				<a href="../account.html">Account</a>
				<a href="../certificates.html">Certificates</a>
			</nav>
		</header>

		<section class="hero">
			<div class="eyebrow">Category</div>
			<h1>Mounted Prints</h1>
			<p>Mounted print sets and gallery wall combinations rendered from the shared product catalog.</p>
		</section>

		<main id="productsRoot" class="products-grid"></main>
	</div>

	<script type="module">
		import { loadProducts, matchesCategory, renderProductCard } from './products.js';

		const productsRoot = document.getElementById('productsRoot');

		try {
			const products = await loadProducts();
			const filtered = products.filter((product) => matchesCategory(product, 'mounted-prints'));
			productsRoot.innerHTML = filtered.length
				? filtered.map(renderProductCard).join('')
				: `<section class="card empty-state"><h3>No mounted prints yet</h3><p>Add mounted print products to the shared catalog to populate this page.</p></section>`;
		} catch (error) {
			productsRoot.innerHTML = `<section class="card empty-state"><h3>Catalog unavailable</h3><p>${error.message}</p></section>`;
		}
	</script>
</body>
</html>
