<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Farmhouse Frames Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2f3b4c;
      color: #fff;
      padding: 16px 24px;
    }
    main {
      max-width: 960px;
      margin: 24px auto;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h2 { margin-top: 0; }
    .section { margin-bottom: 32px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 8px; margin-bottom: 12px;
      border-radius: 4px; border: 1px solid #ccc;
    }
    button {
      background: #2f3b4c; color: #fff; border: none;
      padding: 8px 16px; border-radius: 4px; cursor: pointer;
    }
    #dashboard-section { display: none; }
    #photo-gallery {
      display: flex; flex-wrap: wrap; gap: 20px; margin-top: 12px;
    }
    .photo-item { width: 200px; font-size: 12px; color: #555; }
    .photo-item img {
      width: 100%; border-radius: 8px; object-fit: cover;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>Farmhouse Frames · Admin Dashboard</h1>
</header>

<main>

  <!-- LOGIN -->
  <section id="login-section" class="section">
    <h2>Admin Login
